<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>工具导航 · ToolHub</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
/* ============================================
   CONFIG — 自定义配色 & 样式变量
   ============================================ */
:root {
  --bg: #0e0f11;
  --bg-surface: #16181c;
  --bg-card: #1c1f24;
  --bg-card-hover: #22262d;
  --border: #2a2d35;
  --border-hover: #3d4150;
  --text: #e8eaed;
  --text-secondary: #8b8fa3;
  --text-muted: #5c6070;
  --accent: #e8a44a;
  --accent-subtle: rgba(232, 164, 74, 0.1);
  --accent-glow: rgba(232, 164, 74, 0.25);
  --radius: 12px;
  --radius-sm: 8px;
  --shadow: 0 2px 8px rgba(0,0,0,0.3);
  --shadow-hover: 0 8px 24px rgba(0,0,0,0.4);
  --transition: 0.25s cubic-bezier(0.4, 0, 0.2, 1);
  --font-display: 'Outfit', sans-serif;
  --font-body: 'Noto Sans SC', system-ui, sans-serif;
}

/* ============================================
   RESET
   ============================================ */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

/* ============================================
   BASE
   ============================================ */
html { scroll-behavior: smooth; }

body {
  font-family: var(--font-body);
  background: var(--bg);
  color: var(--text);
  line-height: 1.6;
  min-height: 100vh;
  -webkit-font-smoothing: antialiased;
}

/* Subtle noise texture */
body::before {
  content: '';
  position: fixed;
  inset: 0;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='256' height='256' filter='url(%23n)' opacity='0.03'/%3E%3C/svg%3E");
  pointer-events: none;
  z-index: 0;
}

/* Gradient mesh accent */
body::after {
  content: '';
  position: fixed;
  top: -20%;
  right: -10%;
  width: 50vw;
  height: 50vw;
  background: radial-gradient(circle, var(--accent-glow) 0%, transparent 70%);
  opacity: 0.3;
  pointer-events: none;
  z-index: 0;
}

/* ============================================
   LAYOUT
   ============================================ */
.container {
  position: relative;
  z-index: 1;
  max-width: 1200px;
  margin: 0 auto;
  padding: 0 24px;
}

/* ============================================
   HEADER
   ============================================ */
.header {
  padding: 48px 0 32px;
  text-align: center;
}

.header__title {
  font-family: var(--font-display);
  font-size: clamp(2rem, 5vw, 3.2rem);
  font-weight: 700;
  letter-spacing: -0.02em;
  color: var(--text);
  margin-bottom: 8px;
}

.header__title span {
  color: var(--accent);
}

.header__subtitle {
  color: var(--text-secondary);
  font-size: 0.95rem;
  font-weight: 300;
}

/* ============================================
   SEARCH
   ============================================ */
.search-wrap {
  max-width: 480px;
  margin: 0 auto 40px;
  position: relative;
}

.search-wrap svg {
  position: absolute;
  left: 16px;
  top: 50%;
  transform: translateY(-50%);
  color: var(--text-muted);
  transition: color var(--transition);
  pointer-events: none;
}

.search-input {
  width: 100%;
  padding: 14px 16px 14px 48px;
  background: var(--bg-surface);
  border: 1px solid var(--border);
  border-radius: 50px;
  color: var(--text);
  font-size: 0.95rem;
  font-family: var(--font-body);
  outline: none;
  transition: all var(--transition);
}

.search-input::placeholder {
  color: var(--text-muted);
}

.search-input:focus {
  border-color: var(--accent);
  box-shadow: 0 0 0 3px var(--accent-subtle);
}

.search-input:focus + svg,
.search-input:focus ~ svg {
  color: var(--accent);
}

/* ============================================
   CATEGORY NAV
   ============================================ */
.category-nav {
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
  justify-content: center;
  margin-bottom: 40px;
}

.category-btn {
  padding: 8px 18px;
  background: var(--bg-surface);
  border: 1px solid var(--border);
  border-radius: 50px;
  color: var(--text-secondary);
  font-size: 0.85rem;
  font-family: var(--font-body);
  cursor: pointer;
  transition: all var(--transition);
  white-space: nowrap;
}

.category-btn:hover {
  border-color: var(--border-hover);
  color: var(--text);
  transform: translateY(-1px);
}

.category-btn.active {
  background: var(--accent);
  border-color: var(--accent);
  color: #0e0f11;
  font-weight: 500;
}

/* ============================================
   SECTION
   ============================================ */
.section {
  margin-bottom: 48px;
  animation: fadeInUp 0.5s ease both;
}

.section__header {
  display: flex;
  align-items: center;
  gap: 12px;
  margin-bottom: 20px;
  padding-bottom: 12px;
  border-bottom: 1px solid var(--border);
}

.section__icon {
  font-size: 1.3rem;
  width: 36px;
  height: 36px;
  display: flex;
  align-items: center;
  justify-content: center;
  background: var(--accent-subtle);
  border-radius: var(--radius-sm);
}

.section__title {
  font-family: var(--font-display);
  font-size: 1.15rem;
  font-weight: 600;
  color: var(--text);
  letter-spacing: -0.01em;
}

.section__count {
  color: var(--text-muted);
  font-size: 0.8rem;
  font-weight: 400;
  margin-left: 4px;
}

/* ============================================
   TOOL GRID
   ============================================ */
.tool-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
  gap: 12px;
}

/* ============================================
   TOOL CARD
   ============================================ */
.tool-card {
  display: flex;
  align-items: center;
  gap: 14px;
  padding: 16px;
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  cursor: pointer;
  transition: all var(--transition);
  text-decoration: none;
  color: var(--text);
  position: relative;
  overflow: hidden;
}

.tool-card::before {
  content: '';
  position: absolute;
  inset: 0;
  background: linear-gradient(135deg, var(--accent-subtle) 0%, transparent 60%);
  opacity: 0;
  transition: opacity var(--transition);
}

.tool-card:hover {
  background: var(--bg-card-hover);
  border-color: var(--border-hover);
  box-shadow: var(--shadow-hover);
  transform: translateY(-2px);
}

.tool-card:hover::before {
  opacity: 1;
}

.tool-card__icon {
  font-size: 1.6rem;
  width: 44px;
  height: 44px;
  display: flex;
  align-items: center;
  justify-content: center;
  background: var(--bg-surface);
  border-radius: var(--radius-sm);
  flex-shrink: 0;
  position: relative;
  z-index: 1;
}

.tool-card__info {
  flex: 1;
  min-width: 0;
  position: relative;
  z-index: 1;
}

.tool-card__name {
  font-weight: 500;
  font-size: 0.92rem;
  line-height: 1.3;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.tool-card__desc {
  color: var(--text-muted);
  font-size: 0.78rem;
  line-height: 1.4;
  margin-top: 2px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.tool-card__arrow {
  color: var(--text-muted);
  flex-shrink: 0;
  opacity: 0;
  transform: translateX(-4px);
  transition: all var(--transition);
  position: relative;
  z-index: 1;
}

.tool-card:hover .tool-card__arrow {
  opacity: 1;
  transform: translateX(0);
}

/* ============================================
   EMPTY STATE
   ============================================ */
.empty-state {
  text-align: center;
  padding: 60px 20px;
  color: var(--text-muted);
}

.empty-state__icon {
  font-size: 3rem;
  margin-bottom: 16px;
  opacity: 0.5;
}

.empty-state__text {
  font-size: 1rem;
  color: var(--text-secondary);
}

/* ============================================
   FOOTER
   ============================================ */
.footer {
  text-align: center;
  padding: 32px 0 48px;
  color: var(--text-muted);
  font-size: 0.8rem;
  border-top: 1px solid var(--border);
  margin-top: 24px;
}

.footer a {
  color: var(--accent);
  text-decoration: none;
  transition: opacity var(--transition);
}

.footer a:hover {
  opacity: 0.8;
}

/* ============================================
   ANIMATIONS
   ============================================ */
@keyframes fadeInUp {
  from {
    opacity: 0;
    transform: translateY(16px);
  }
  to {
    opacity: 1;
    transform: translateY(0);
  }
}

.tool-card {
  animation: fadeInUp 0.4s ease both;
}

/* Staggered animation delays set via JS */

/* ============================================
   RESPONSIVE
   ============================================ */
@media (max-width: 768px) {
  .header { padding: 32px 0 24px; }
  .search-wrap { margin-bottom: 24px; }
  .section { margin-bottom: 32px; }
  .tool-grid {
    grid-template-columns: 1fr;
    gap: 8px;
  }
  .tool-card { padding: 14px; }
  .category-nav { gap: 6px; margin-bottom: 24px; }
  .category-btn { padding: 6px 14px; font-size: 0.8rem; }
}

@media (min-width: 769px) and (max-width: 1024px) {
  .tool-grid {
    grid-template-columns: repeat(2, 1fr);
  }
}

@media (min-width: 1025px) {
  .tool-grid {
    grid-template-columns: repeat(3, 1fr);
  }
}

@media (min-width: 1400px) {
  .tool-grid {
    grid-template-columns: repeat(4, 1fr);
  }
}

/* ============================================
   SCROLLBAR
   ============================================ */
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: var(--bg); }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: var(--text-muted); }
</style>
</head>
<body>

<div class="container">
  <header class="header">
    <h1 class="header__title">Tool<span>Hub</span></h1>
    <p class="header__subtitle">个人工具导航 · 快速访问常用工具与资源</p>
  </header>

  <div class="search-wrap">
    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
    <input type="text" class="search-input" id="searchInput" placeholder="搜索工具名称或描述…" autocomplete="off">
  </div>

  <nav class="category-nav" id="categoryNav"></nav>

  <main id="mainContent"></main>

  <footer class="footer">
    Powered by <a href="https://github.com/luzhenhuan" target="_blank" rel="noopener">luzhenhuan</a> · 在配置区轻松增减工具模块

<script>

// ============================================

const CATEGORIES = [

  { name: 'VS Code Web',     url: 'https://vscode.dev',              icon: '💻', desc: '在线版 VS Code 编辑器',    category: 'dev' },

  { name: 'Stack Overflow',  url: 'https://stackoverflow.com',       icon: '📚', desc: '开发者问答社区',          category: 'dev' },
  { name: 'MDN Web Docs',    url: 'https://developer.mozilla.org',   icon: '📖', desc: 'Web 技术权威文档',       category: 'dev' },
  { name: 'Can I Use',      url: 'https://caniuse.com',              icon: '✅', desc: '浏览器兼容性查询',        category: 'dev' },

  // ——— 设计资源 ———
  { name: 'Dribbble',  url: 'https://dribbble.com',        icon: '🏀', desc: '设计师作品展示社区',      category: 'design' },
  { name: 'Figma',     url: 'https://www.figma.com',       icon: '🎨', desc: '协作界面设计工具',       category: 'design' },
  { name: 'Unsplash',  url: 'https://unsplash.com',        icon: '📷', desc: '高质量免费图库',          category: 'design' },
  { name: 'Coolors',   url: 'https://coolors.co',          icon: '🌈', desc: '配色方案生成器',          category: 'design' },
  { name: 'Font Awesome', url: 'https://fontawesome.com',  icon: '🔤', desc: '图标字体库',             category: 'design' },
  { name: 'Mobbin',    url: 'https://mobbin.com',          icon: '📱', desc: '移动端 UI 设计参考',     category: 'design' },

  // ——— 效率工具 ———
  { name: 'Notion',     url: 'https://www.notion.so',       icon: '📝', desc: '全能笔记与项目管理',      category: 'prod' },
  { name: 'Trello',    url: 'https://trello.com',           icon: '📋', desc: '看板式任务管理',          category: 'prod' },
  { name: 'Google Drive', url: 'https://drive.google.com', icon: '💾', desc: '云端文件存储与协作',     category: 'prod' },
  { name: 'Obsidian',   url: 'https://obsidian.md',         icon: '🔮', desc: '本地知识图谱笔记',       category: 'prod' },
  { name: 'Excalidraw', url: 'https://excalidraw.com',      icon: '🖌️', desc: '手绘风格白板工具',      category: 'prod' },
  { name: 'Linear',     url: 'https://linear.app',          icon: '📐', desc: '现代化项目管理工具',     category: 'prod' },

  // ——— 常用网站 ———
  { name: 'Gmail',     url: 'https://mail.google.com',   icon: '📧', desc: 'Google 邮箱服务',       category: 'web' },

  { name: 'Twitter/X', url: 'https://x.com',             icon: '🐦', desc: '社交媒体与资讯平台',    category: 'web' },
  { name: 'Reddit',    url: 'https://www.reddit.com',     icon: '🔴', desc: '社区论坛与内容聚合',    category: 'web' },
  { name: 'Hacker News', url: 'https://news.ycombinator.com', icon: '🔶', desc: '技术与创业资讯', category: 'web' },

  // ——— 媒体创作 ———
  { name: 'Figma 自带原型',  url: 'https://www.figma.com',     icon: '🎬', desc: '原型与交互设计',        category: 'media' },
  { name: 'Remove.bg',     url: 'https://www.remove.bg',       icon: '✂️', desc: 'AI 一键去背景',         category: 'media' },
  { name: 'TinyPNG',       url: 'https://tinypng.com',          icon: '📦', desc: '图片无损压缩',          category: 'media' },
  { name: 'ScreenToGif',   url: 'https://www.screentogif.com', icon: '🎞️', desc: '屏幕录制转 GIF',      category: 'media' },

  // ——— 个人定制 ———
  { name: '我的博客',     url: 'https://luzhenhuan.github.io',     icon: '✍️', desc: '个人博客站点',       category: 'custom' },
  { name: 'ChatGPT 定制', url: 'https://chat.openai.com',          icon: '⚙️', desc: '自定义 GPT 助手',    category: 'custom' },
  { name: '书签收藏',     url: '#',                                icon: '🔖', desc: '常用书签与收藏夹',    category: 'custom' },
  { name: '在线工具箱',   url: 'https://tool.lu',                  icon: '🧰', desc: '多功能在线工具集',   category: 'custom' },

  // ——— 桌游 ———
  { name: '圣托里尼天神卡', url: 'santorini.html',              icon: '🏛️', desc: '天神卡能力速查模拟器', category: 'board' },
  { name: 'Board Game Arena', url: 'https://boardgamearena.com',    icon: '♟️', desc: '在线桌游对战平台',  category: 'board' },
  { name: 'Yucata',          url: 'https://www.yucata.de',          icon: '🏰', desc: '德式桌游在线平台',  category: 'board' },
  { name: 'Tabletopia',      url: 'https://tabletopia.com',         icon: '🎲', desc: '3D 桌游模拟器',     category: 'board' },
  { name: 'BGG',             url: 'https://boardgamegeek.com',      icon: '🏆', desc: '桌游数据库与社区',  category: 'board' },
  { name: 'PlayingCards.io', url: 'https://playingcards.io',        icon: '🃏', desc: '在线纸牌与棋盘',    category: 'board' },

  // ——— 游戏 ———
  { name: 'Steam',           url: 'https://store.steampowered.com', icon: '🎮', desc: 'PC 游戏商城与社区',   category: 'game' },
  { name: 'Epic Games',     url: 'https://www.epicgames.com',       icon: '👾', desc: 'Epic 游戏商店',      category: 'game' },
  { name: 'Xbox Game Pass',  url: 'https://www.xbox.com/game-pass', icon: '🟢', desc: 'Xbox 订阅制游戏服务', category: 'game' },
  { name: 'IGN',             url: 'https://www.ign.com',            icon: '🔥', desc: '游戏评测与资讯',    category: 'game' },
  { name: 'HowLongToBeat',   url: 'https://howlongtobeat.com',      icon: '⏱️', desc: '游戏通关时长查询',   category: 'game' },
];

// ============================================
// 渲染引擎 — 一般无需修改
// ============================================

const mainContent = document.getElementById('mainContent');
const categoryNav = document.getElementById('categoryNav');
const searchInput = document.getElementById('searchInput');

let activeCategory = 'all';
let searchQuery = '';

function getCategoryMeta(key) {
  return CATEGORIES.find(c => c.key === key) || { label: key, icon: '📁' };
}

function renderCategoryNav() {
  categoryNav.innerHTML = CATEGORIES.map(cat => `
    <button class="category-btn ${cat.key === activeCategory ? 'active' : ''}" data-category="${cat.key}">
      ${cat.icon} ${cat.label}
    </button>
  `).join('');

  categoryNav.querySelectorAll('.category-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      activeCategory = btn.dataset.category;
      renderCategoryNav();
      renderTools();
    });
  });
}

function getFilteredTools() {
  let filtered = TOOLS;

  if (activeCategory !== 'all') {
    filtered = filtered.filter(t => t.category === activeCategory);
  }

  if (searchQuery) {
    const q = searchQuery.toLowerCase();
    filtered = filtered.filter(t =>
      t.name.toLowerCase().includes(q) ||
      t.desc.toLowerCase().includes(q) ||
      getCategoryMeta(t.category).label.toLowerCase().includes(q)
    );
  }

  return filtered;
}

function renderTools() {
  const tools = getFilteredTools();

  if (tools.length === 0) {
    mainContent.innerHTML = `
      <div class="empty-state">
        <div class="empty-state__icon">🔍</div>
        <p class="empty-state__text">没有找到匹配的工具</p>
      </div>
    `;
    return;
  }

  // Group by category (respect filter)
  const groups = {};
  tools.forEach(t => {
    if (!groups[t.category]) groups[t.category] = [];
    groups[t.category].push(t);
  });

  // Preserve category order
  const orderedKeys = CATEGORIES.filter(c => c.key !== 'all').map(c => c.key);
  const sortedKeys = orderedKeys.filter(k => groups[k]);

  let html = '';
  let cardIndex = 0;

  sortedKeys.forEach(catKey => {
    const cat = getCategoryMeta(catKey);
    const catTools = groups[catKey];

    html += `
      <section class="section" style="animation-delay: ${cardIndex * 0.03}s">
        <div class="section__header">
          <div class="section__icon">${cat.icon}</div>
          <h2 class="section__title">${cat.label}<span class="section__count">${catTools.length}</span></h2>
        </div>
        <div class="tool-grid">
    `;

    catTools.forEach((tool, i) => {
      html += `
        <a href="${tool.url}" target="_blank" rel="noopener noreferrer"
           class="tool-card" style="animation-delay: ${(cardIndex + i) * 0.04}s">
          <div class="tool-card__icon">${tool.icon}</div>
          <div class="tool-card__info">
            <div class="tool-card__name">${tool.name}</div>
            <div class="tool-card__desc">${tool.desc}</div>
          </div>
          <svg class="tool-card__arrow" xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg>
        </a>
      `;
    });

    html += `</div></section>`;
    cardIndex += catTools.length;
  });

  mainContent.innerHTML = html;
}

// Search handler with debounce
let debounceTimer;
searchInput.addEventListener('input', (e) => {
  clearTimeout(debounceTimer);
  debounceTimer = setTimeout(() => {
    searchQuery = e.target.value.trim();
    renderTools();
  }, 150);
});

// Keyboard shortcut: focus search with "/"
document.addEventListener('keydown', (e) => {
  if (e.key === '/' && document.activeElement !== searchInput) {
    e.preventDefault();
    searchInput.focus();
  }
  if (e.key === 'Escape' && document.activeElement === searchInput) {
    searchInput.blur();
  }
});

// Initial render
renderCategoryNav();
renderTools();
</script>
</body>
</html>
