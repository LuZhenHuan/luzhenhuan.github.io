<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>圣托里尼天神卡模拟器 · Santorini God Powers</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700&family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0e0f11;
  --bg-surface: #16181c;
  --bg-card: #1c1f24;
  --bg-card-hover: #22262d;
  --border: #2a2d35;
  --border-hover: #3d4150;
  --text: #e8eaed;
  --text-secondary: #8b8fa3;
  --text-muted: #5c6070;
  --accent: #e8a44a;
  --accent-subtle: rgba(232, 164, 74, 0.1);
  --accent-glow: rgba(232, 164, 74, 0.25);
  --simple: #4caf50;
  --simple-bg: rgba(76, 175, 80, 0.1);
  --simple-border: rgba(76, 175, 80, 0.25);
  --advanced: #ff9800;
  --advanced-bg: rgba(255, 152, 0, 0.08);
  --advanced-border: rgba(255, 152, 0, 0.25);
  --golden: #9c27b0;
  --golden-bg: rgba(156, 39, 176, 0.08);
  --golden-border: rgba(156, 39, 176, 0.25);
  --hero: #2196f3;
  --hero-bg: rgba(33, 150, 243, 0.08);
  --hero-border: rgba(33, 150, 243, 0.25);
  --lose: #f44336;
  --setup-tag: #607d8b;
  --radius: 12px;
  --radius-sm: 8px;
  --shadow: 0 2px 8px rgba(0,0,0,0.3);
  --shadow-hover: 0 8px 24px rgba(0,0,0,0.4);
  --transition: 0.25s cubic-bezier(0.4, 0, 0.2, 1);
  --font-display: 'Outfit', sans-serif;
  --font-body: 'Noto Sans SC', system-ui, sans-serif;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }

body {
  font-family: var(--font-body);
  background: var(--bg);
  color: var(--text);
  line-height: 1.6;
  min-height: 100vh;
  -webkit-font-smoothing: antialiased;
}

body::before {
  content: '';
  position: fixed;
  inset: 0;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='256' height='256' filter='url(%23n)' opacity='0.03'/%3E%3C/svg%3E");
  pointer-events: none;
  z-index: 0;
}
body::after {
  content: '';
  position: fixed;
  top: -20%;
  right: -10%;
  width: 50vw;
  height: 50vw;
  background: radial-gradient(circle, var(--accent-glow) 0%, transparent 70%);
  opacity: 0.25;
  pointer-events: none;
  z-index: 0;
}

.container { position: relative; z-index: 1; max-width: 1200px; margin: 0 auto; padding: 0 24px; }

/* HEADER */
.header { padding: 40px 0 16px; }
.header__top { display: flex; align-items: center; gap: 16px; margin-bottom: 12px; }
.header__back {
  display: inline-flex; align-items: center; gap: 6px;
  color: var(--text-muted); text-decoration: none; font-size: 0.85rem;
  padding: 6px 12px; border-radius: 50px; border: 1px solid var(--border);
  transition: all var(--transition);
}
.header__back:hover { color: var(--accent); border-color: var(--accent); }
.header__title {
  font-family: var(--font-display); font-size: clamp(1.8rem, 4vw, 2.6rem);
  font-weight: 700; letter-spacing: -0.02em; color: var(--text);
}
.header__title span { color: var(--accent); }
.header__subtitle { color: var(--text-secondary); font-size: 0.9rem; font-weight: 300; }

/* RANDOM PICK */
.random-section {
  margin: 24px 0 32px; padding: 28px 32px;
  background: linear-gradient(135deg, var(--accent-subtle) 0%, var(--bg-surface) 100%);
  border: 1px solid var(--accent-glow); border-radius: 16px;
  text-align: center;
}
.random-section__title {
  font-family: var(--font-display); font-size: 1.1rem; font-weight: 600;
  color: var(--text); margin-bottom: 4px;
}
.random-section__desc { color: var(--text-muted); font-size: 0.82rem; margin-bottom: 16px; }
.random-btn {
  display: inline-flex; align-items: center; gap: 8px;
  padding: 12px 28px; background: var(--accent); color: #0e0f11;
  border: none; border-radius: 50px; font-size: 0.95rem; font-weight: 600;
  font-family: var(--font-display); cursor: pointer;
  transition: all var(--transition); letter-spacing: 0.02em;
}
.random-btn:hover { transform: translateY(-2px); box-shadow: 0 4px 20px var(--accent-glow); }
.random-btn:active { transform: translateY(0); }
.random-result {
  margin-top: 20px; display: none;
  animation: fadeInUp 0.4s ease both;
}
.random-result.show { display: block; }
.random-result__cards {
  display: flex; justify-content: center; gap: 16px; flex-wrap: wrap;
}
.random-god-card {
  background: var(--bg-card); border: 1px solid var(--border);
  border-radius: var(--radius); padding: 20px 24px; min-width: 200px;
  text-align: center;
}
.random-god-card__icon { font-size: 2.2rem; margin-bottom: 8px; }
.random-god-card__name { font-family: var(--font-display); font-size: 1.1rem; font-weight: 600; }
.random-god-card__title { color: var(--text-muted); font-size: 0.8rem; font-style: italic; }

/* FILTERS */
.filters { margin-bottom: 24px; }
.filter-row { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 12px; align-items: center; }
.filter-label { color: var(--text-muted); font-size: 0.8rem; font-weight: 500; margin-right: 4px; min-width: 36px; }
.filter-btn {
  padding: 6px 14px; background: var(--bg-surface); border: 1px solid var(--border);
  border-radius: 50px; color: var(--text-secondary); font-size: 0.8rem;
  font-family: var(--font-body); cursor: pointer; transition: all var(--transition);
  white-space: nowrap;
}
.filter-btn:hover { border-color: var(--border-hover); color: var(--text); transform: translateY(-1px); }
.filter-btn.active { background: var(--accent); border-color: var(--accent); color: #0e0f11; font-weight: 500; }
.filter-btn.active-simple { background: var(--simple); border-color: var(--simple); color: #fff; font-weight: 500; }
.filter-btn.active-advanced { background: var(--advanced); border-color: var(--advanced); color: #fff; font-weight: 500; }
.filter-btn.active-golden { background: var(--golden); border-color: var(--golden); color: #fff; font-weight: 500; }
.filter-btn.active-hero { background: var(--hero); border-color: var(--hero); color: #fff; font-weight: 500; }

/* SEARCH */
.search-wrap { max-width: 360px; position: relative; }
.search-wrap svg {
  position: absolute; left: 12px; top: 50%; transform: translateY(-50%);
  color: var(--text-muted); transition: color var(--transition); pointer-events: none;
}
.search-input {
  width: 100%; padding: 9px 14px 9px 38px;
  background: var(--bg-surface); border: 1px solid var(--border);
  border-radius: 50px; color: var(--text); font-size: 0.85rem;
  font-family: var(--font-body); outline: none; transition: all var(--transition);
}
.search-input::placeholder { color: var(--text-muted); }
.search-input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-subtle); }

/* GOD GRID */
.god-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
  gap: 14px;
  margin-bottom: 48px;
}

/* GOD CARD */
.god-card {
  background: var(--bg-card); border: 1px solid var(--border);
  border-radius: var(--radius); overflow: hidden;
  transition: all var(--transition); cursor: default;
  animation: fadeInUp 0.4s ease both;
}
.god-card:hover { background: var(--bg-card-hover); border-color: var(--border-hover); transform: translateY(-2px); box-shadow: var(--shadow-hover); }

.god-card__top { padding: 18px 20px 12px; display: flex; align-items: flex-start; gap: 14px; }
.god-card__icon { font-size: 2rem; line-height: 1; flex-shrink: 0; }
.god-card__identity { flex: 1; min-width: 0; }
.god-card__name { font-family: var(--font-display); font-size: 1.15rem; font-weight: 700; line-height: 1.2; }
.god-card__title { font-size: 0.8rem; color: var(--text-muted); font-style: italic; margin-top: 2px; }

.god-card__tags { display: flex; gap: 6px; flex-wrap: wrap; padding: 0 20px 8px; }
.tag {
  display: inline-flex; align-items: center; gap: 3px;
  font-size: 0.68rem; font-weight: 500; padding: 2px 8px;
  border-radius: 50px; letter-spacing: 0.02em;
}
.tag-type-simple { background: var(--simple-bg); color: var(--simple); border: 1px solid var(--simple-border); }
.tag-type-advanced { background: var(--advanced-bg); color: var(--advanced); border: 1px solid var(--advanced-border); }
.tag-type-golden { background: var(--golden-bg); color: var(--golden); border: 1px solid var(--golden-border); }
.tag-type-hero { background: var(--hero-bg); color: var(--hero); border: 1px solid var(--hero-border); }
.tag-phase { background: rgba(255,255,255,0.06); color: var(--text-muted); border: 1px solid rgba(255,255,255,0.08); }
.tag-players { background: rgba(255,255,255,0.04); color: var(--text-muted); border: 1px solid rgba(255,255,255,0.06); }
.tag-banned { background: rgba(244,67,54,0.08); color: var(--lose); border: 1px solid rgba(244,67,54,0.2); }

.god-card__ability {
  padding: 10px 20px 16px;
}
.god-card__ability-label {
  font-size: 0.65rem; text-transform: uppercase; letter-spacing: 0.08em;
  color: var(--text-muted); margin-bottom: 6px; font-weight: 600;
}
.god-card__ability-text {
  font-size: 0.85rem; line-height: 1.55; color: var(--text-secondary);
}
.god-card__ability-text strong,
.god-card__ability-text b { color: var(--text); font-weight: 600; }

.god-card__setup {
  padding: 0 20px 8px;
}
.god-card__setup-text {
  font-size: 0.82rem; line-height: 1.5; color: var(--text-secondary);
  padding: 8px 12px; background: rgba(255,255,255,0.03); border-radius: var(--radius-sm);
  border-left: 3px solid var(--accent);
}
.god-card__banned {
  padding: 0 20px 14px;
}
.god-card__banned-label {
  font-size: 0.65rem; text-transform: uppercase; letter-spacing: 0.08em;
  color: var(--lose); font-weight: 600; margin-bottom: 4px;
}
.god-card__banned-text { font-size: 0.78rem; color: var(--text-muted); }

/* EMPTY STATE */
.empty-state { text-align: center; padding: 60px 20px; }
.empty-state__icon { font-size: 3rem; margin-bottom: 16px; opacity: 0.5; }
.empty-state__text { font-size: 1rem; color: var(--text-secondary); }

/* COUNTER */
.counter { color: var(--text-muted); font-size: 0.8rem; margin-bottom: 16px; }

/* FOOTER */
.footer {
  text-align: center; padding: 32px 0 48px; color: var(--text-muted);
  font-size: 0.8rem; border-top: 1px solid var(--border); margin-top: 24px;
}
.footer a { color: var(--accent); text-decoration: none; transition: opacity var(--transition); }
.footer a:hover { opacity: 0.8; }

/* ANIMATIONS */
@keyframes fadeInUp {
  from { opacity: 0; transform: translateY(16px); }
  to { opacity: 1; transform: translateY(0); }
}

/* RESPONSIVE */
@media (max-width: 768px) {
  .header { padding: 24px 0 12px; }
  .god-grid { grid-template-columns: 1fr; }
  .filter-row { gap: 6px; }
  .filter-btn { padding: 5px 10px; font-size: 0.75rem; }
  .random-result__cards { flex-direction: column; align-items: center; }
}
@media (min-width: 769px) and (max-width: 1100px) {
  .god-grid { grid-template-columns: repeat(2, 1fr); }
}

::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: var(--bg); }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: var(--text-muted); }
</style>
</head>

// ============================================
// 渲染逻辑
// ============================================
const godGrid = document.getElementById('godGrid');
const counter = document.getElementById('counter');
const searchInput = document.getElementById('searchInput');

let activeType = 'all';
let activePhase = 'all';
let searchQuery = '';

const TYPE_LABELS = {
  simple: { label: '简单神', class: 'tag-type-simple' },
  advanced: { label: '进阶神', class: 'tag-type-advanced' },
  golden: { label: '金羊毛', class: 'tag-type-golden' },
  hero: { label: '英雄', class: 'tag-type-hero' },
};

const PHASE_LABELS = {
  move: '移动', build: '建造', turn: '回合',
  opponent: '对手回合', win: '胜利条件', end: '回合结束'
};

function getPlayerLabel(players) {
  return players.join('/');
}

function getFilteredGods() {
  let filtered = GODS;
  if (activeType !== 'all') {
    filtered = filtered.filter(g => g.type === activeType);
  }
  if (activePhase !== 'all') {
    filtered = filtered.filter(g => g.phases.includes(activePhase));
  }
  if (searchQuery) {
    const q = searchQuery.toLowerCase();
    filtered = filtered.filter(g =>
      g.name.toLowerCase().includes(q) ||
      g.nameCN.includes(q) ||
      g.title.toLowerCase().includes(q) ||
      g.abilityCN.toLowerCase().includes(q)
    );
  }
  return filtered;
}

function renderGods() {
  const gods = getFilteredGods();
  counter.textContent = `显示 ${gods.length} / ${GODS.length} 位天神`;

  if (gods.length === 0) {
    godGrid.innerHTML = `<div class="empty-state"><div class="empty-state__icon">🔍</div><p class="empty-state__text">没有找到匹配的天神</p></div>`;
    return;
  }

  godGrid.innerHTML = gods.map((g, i) => {
    const typeInfo = TYPE_LABELS[g.type];
    const playersTag = `<span class="tag tag-players">👥 ${getPlayerLabel(g.players)}人</span>`;
    const goldenTag = g.golden ? '<span class="tag tag-phase">🐑 金羊毛</span>' : '';
    const phaseTags = g.phases.map(p => `<span class="tag tag-phase">${PHASE_LABELS[p] || p}</span>`).join('');
    const bannedTag = g.banned.length > 0
      ? `<div class="god-card__banned"><div class="god-card__banned-label">⚠️ 禁止对局</div><div class="god-card__banned-text">${g.banned.join(', ')}</div></div>`
      : '';

    const setupMatch = g.ability.match(/<b>Setup:?<\/b>\s*(.+?)(?=<br><br>|$)/s);
    const setupText = setupMatch
      ? `<div class="god-card__setup"><div class="god-card__setup-text">${setupMatch[1]}</div></div>`
      : '';

    return `
      <div class="god-card" style="animation-delay: ${i * 0.04}s">
        <div class="god-card__top">
          <div class="god-card__icon">${g.icon}</div>
          <div class="god-card__identity">
            <div class="god-card__name">${g.nameCN} · ${g.name}</div>
            <div class="god-card__title">${g.title}</div>
          </div>
        </div>
        <div class="god-card__tags">
          <span class="tag ${typeInfo.class}">${typeInfo.label}</span>
          ${playersTag}${goldenTag}${phaseTags}
        </div>
        ${setupText}
        <div class="god-card__ability">
          <div class="god-card__ability-label">能力描述 · Ability</div>
          <div class="god-card__ability-text">${g.abilityCN}</div>
        </div>
        ${bannedTag}
      </div>
    `;
  }).join('');
}

// Filter buttons
document.querySelectorAll('.filter-btn[data-filter="type"]').forEach(btn => {
  btn.addEventListener('click', () => {
    activeType = btn.dataset.value;
    document.querySelectorAll('.filter-btn[data-filter="type"]').forEach(b => {
      b.className = 'filter-btn';
      if (b.dataset.value === activeType) {
        if (activeType === 'simple') b.classList.add('active-simple');
        else if (activeType === 'advanced') b.classList.add('active-advanced');
        else if (activeType === 'golden') b.classList.add('active-golden');
        else if (activeType === 'hero') b.classList.add('active-hero');
        else b.classList.add('active');
      }
    });
    renderGods();
  });
});

document.querySelectorAll('.filter-btn[data-filter="phase"]').forEach(btn => {
  btn.addEventListener('click', () => {
    activePhase = btn.dataset.value;
    document.querySelectorAll('.filter-btn[data-filter="phase"]').forEach(b => {
      b.className = 'filter-btn';
      if (b.dataset.value === activePhase) b.classList.add('active');
    });
    renderGods();
  });
});

// Search
let debounceTimer;
searchInput.addEventListener('input', (e) => {
  clearTimeout(debounceTimer);
  debounceTimer = setTimeout(() => {
    searchQuery = e.target.value.trim();
    renderGods();
  }, 150);
});

// Keyboard shortcut
document.addEventListener('keydown', (e) => {
  if (e.key === '/' && document.activeElement !== searchInput) { e.preventDefault(); searchInput.focus(); }
  if (e.key === 'Escape' && document.activeElement === searchInput) searchInput.blur();
});

// Random pick
const randomBtn = document.getElementById('randomBtn');
const randomResult = document.getElementById('randomResult');
const randomCards = document.getElementById('randomCards');

randomBtn.addEventListener('click', () => {
  const pool = GODS.filter(g => g.type !== 'hero' && g.players.includes(2));
  const shuffled = pool.sort(() => Math.random() - 0.5);
  const picked = shuffled.slice(0, 2);

  randomCards.innerHTML = picked.map(g => {
    const typeInfo = TYPE_LABELS[g.type];
    return `
      <div class="random-god-card">
        <div class="random-god-card__icon">${g.icon}</div>
        <div class="random-god-card__name">${g.nameCN} · ${g.name}</div>
        <div class="random-god-card__title">${g.title}</div>
        <div style="margin-top:8px"><span class="tag ${typeInfo.class}">${typeInfo.label}</span></div>
      </div>
    `;
  }).join('');

  randomResult.classList.add('show');
  randomResult.style.animation = 'none';
  randomResult.offsetHeight; // trigger reflow
  randomResult.style.animation = 'fadeInUp 0.4s ease both';
});

// Initial render
renderGods();
</script>
